# Runtime definition for the EC2 instance. Synced to /opt/app/ on every
# deploy and driven with: docker compose --env-file deploy.env ...
# deploy.env (non-secret) provides ECR_IMAGE and DUCKDNS_HOST; the api
# service's secrets land in /opt/app/.env, rendered from SSM by render-env.sh.
services:
  api:
    image: ${ECR_IMAGE}
    env_file: /opt/app/.env
    restart: unless-stopped
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DUCKDNS_HOST=${DUCKDNS_HOST}
    volumes:
      - /opt/app/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
